<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metropolis Festival 2026 — Système de Signalétique Wayfinding (Graff)</title>
  <meta name="description" content="Présentation interactive de la signalétique directionnelle du Metropolis Festival 2026 en style graffiti haute visibilité.">
  
  <!-- Import sleek, high-quality Google Fonts (including Lilita One for legible Graffiti/Marker style) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Lilita+One&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* CSS DESIGN SYSTEM & TOKENS */
    :root {
      --bg-app: #08090E;
      --bg-sidebar: #0F111A;
      --bg-card: #FFFFFF; /* Forced white background for wayfinding signage */
      --text-main: #FFFFFF;
      --text-muted: #555E70;
      --accent: #FF007F; /* Fallback accent - dynamically overwritten by JS for UI */
      --accent-rgb: 255, 0, 127;
      --border: #1F232D;
      --border-hover: #333A4A;
      --shadow: rgba(0, 0, 0, 0.6);
      --font-primary: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-tech: 'Space Grotesk', monospace;
      --transition-speed: 0.3s;
    }

    [data-theme="light"] {
      --bg-app: #F4F6F9;
      --bg-sidebar: #FFFFFF;
      --text-main: #0E1017;
      --text-muted: #848D9E;
      --border: #E1E5ED;
      --border-hover: #C5CBD6;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    /* GENERAL STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-primary);
      background-color: var(--bg-app);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }

    /* APP HEADER */
    .app-header {
      background-color: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo svg {
      width: 28px;
      height: 28px;
      fill: var(--accent);
      filter: drop-shadow(0 0 8px rgba(var(--accent-rgb), 0.5));
      transition: fill 0.2s ease, filter 0.2s ease;
    }

    .brand-title {
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .brand-subtitle {
      font-family: var(--font-tech);
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    /* BUTTONS & SEGMENTED CONTROLS */
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      background-color: rgba(var(--accent-rgb), 0.05);
      box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.15);
    }

    .btn-active {
      background-color: rgba(var(--accent-rgb), 0.1);
      border-color: var(--accent);
    }

    /* Direction Segmented Control */
    .btn-group {
      display: flex;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      transition: border-color var(--transition-speed);
    }

    .btn-group .btn-segment {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 0.45rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-group .btn-segment:hover {
      color: var(--text-main);
    }

    .btn-group .btn-segment.active {
      background-color: var(--accent);
      color: #000000;
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.35);
    }

    [data-theme="light"] .btn-group .btn-segment.active {
      color: #FFFFFF;
    }

    /* MAIN CONTAINER */
    .main-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 65px);
      overflow: hidden;
    }

    /* SIDEBAR NAVIGATION */
    .sidebar {
      width: 320px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-family: var(--font-tech);
    }

    .nav-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      justify-content: space-between;
    }

    .nav-item:hover {
      background-color: rgba(var(--accent-rgb), 0.03);
      border-color: var(--border);
    }

    .nav-item.active {
      background-color: rgba(var(--accent-rgb), 0.08);
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .nav-item-text {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .nav-item-num {
      font-family: var(--font-tech);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .nav-item.active .nav-item-num {
      color: var(--accent);
    }

    /* CONTENT VIEW AREA */
    .content-area {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      position: relative;
    }

    /* CARD DISPLAY CONTAINER */
    .presentation-container {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    /* SIGNAGE CARD RENDER (Pure White Arrow-Only Page) */
    .signage-card {
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: var(--bg-card);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      border: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Core content: SVG Arrow Presentation Container */
    .card-body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 2% 4%;
    }

    .wayfinding-arrow-svg {
      width: 100%;
      height: 100%;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), filter var(--transition-speed);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    /* Directional hover movement based on direction */
    .signage-card[data-dir="left"]:hover .wayfinding-arrow-svg {
      transform: translateX(-15px) scale(1.01);
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25));
    }
    
    .signage-card[data-dir="right"]:hover .wayfinding-arrow-svg {
      transform: translateX(15px) scale(1.01);
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25));
    }

    .wayfinding-arrow-svg polygon {
      transition: points 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .wayfinding-arrow-svg text {
      transition: x 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* INTERACTION CONTROLS UNDER SLIDE */
    .presentation-controls {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .arrow-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: var(--bg-sidebar);
      border: 1px solid var(--border);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .arrow-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background-color: rgba(var(--accent-rgb), 0.05);
      box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.2);
      transform: translateY(-2px);
    }

    .arrow-btn:active {
      transform: translateY(1px);
    }

    .slide-counter {
      font-family: var(--font-tech);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* GRID VIEW GRID */
    .grid-view-container {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 1200px;
      padding: 1rem 0;
    }

    .grid-view-container.active {
      display: grid;
    }

    /* Grid mini card styling with static theme colors */
    .mini-card {
      aspect-ratio: 16 / 9;
      background-color: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .mini-card:hover {
      border-color: var(--theme-accent) !important;
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .mini-card[data-dir="left"]:hover .wayfinding-arrow-svg {
      transform: translateX(-4px);
    }
    
    .mini-card[data-dir="right"]:hover .wayfinding-arrow-svg {
      transform: translateX(4px);
    }

    .mini-card-body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
      height: 100%;
    }

    /* KEYBOARD HINT */
    .keyboard-hint {
      position: absolute;
      bottom: 1.5rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .keyboard-hint kbd {
      background-color: var(--bg-sidebar);
      border: 1px solid var(--border);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: var(--font-tech);
    }

    /* RESPONSIVE DESIGN STYLES */
    @media (max-width: 900px) {
      .main-container {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        height: auto;
        max-height: 180px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .nav-list {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.8rem;
        gap: 0.6rem;
      }

      .nav-item {
        flex-shrink: 0;
        padding: 0.6rem 1rem;
        flex-direction: column;
        gap: 0.2rem;
      }

      .nav-item.active {
        box-shadow: inset 0 -3px 0 var(--accent);
      }

      .content-area {
        padding: 1.5rem 1rem;
      }
      
      .keyboard-hint {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .header-controls {
        gap: 0.5rem;
      }
      
      .btn-group .btn-segment {
        padding: 0.4rem 0.6rem;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 500px) {
      .app-header {
        padding: 0.8rem 1rem;
      }

      .brand-title {
        font-size: 0.95rem;
      }

      .btn span, .btn-group span {
        display: none;
      }

      .btn, .btn-group .btn-segment {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- APP HEADER -->
  <header class="app-header">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M11,6V12H6L12,18L18,12H13V6H11Z"/>

      <!-- DIRECTION TOGGLE -->

      <!-- DOWNLOAD BUTTONS -->
      <button class="btn" id="btn-download-png" onclick="downloadPng()" title="Télécharger en PNG (Image HD)">

      <button class="btn" id="btn-download-svg" onclick="downloadSvg()" title="Télécharger en SVG (Vecteur)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>SVG</span>

      <button class="btn" id="btn-theme" onclick="toggleTheme()" title="Changer le thème">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN APP CONTAINER -->
  <div class="main-container">
    
    <!-- SIDEBAR CATEGORY LIST -->
    <aside class="sidebar" id="sidebar-nav">
      <div class="sidebar-header">
        <h2>Signalétiques (10)</h2>
      </div>
      <ul class="nav-list" id="nav-list">
        <!-- Rendered dynamically by JS -->
      </ul>
    </aside>

    <!-- CONTENT DISPLAY AREA -->
    <main class="content-area">
      
      <!-- PRESENTATION SLIDE CONTAINER -->
      <div class="presentation-container" id="presentation-view">
        
        <!-- THE SIGNAL CARD (Forced white background, B&W Graffiti arrow and drips) -->
        <div class="signage-card" id="signage-card" data-dir="left">
          <div class="card-body" id="card-body-content">
            <!-- Rendered dynamically by JS to handle drips/direction -->
          </div>
        </div>

        <!-- NAVIGATION CONTROLS BELOW SLIDE -->
        <div class="presentation-controls">
          <button class="arrow-btn" onclick="navigate(-1)" title="Précédent" aria-label="Page précédente">←</button>
          <div class="slide-counter" id="slide-counter">01 / 10</div>
          <button class="arrow-btn" onclick="navigate(1)" title="Suivant" aria-label="Page suivante">→</button>

      </div>

      <!-- GRID OVERVIEW MODE CONTAINER -->
      <div class="grid-view-container" id="grid-view">

      </div>

      <!-- KEYBOARD SHORTCUTS HINT -->
      <div class="keyboard-hint" id="keyboard-hint">

        <span>Thème |</span>
        <kbd>S</kbd>
        <span>Sens</span>
      </div>

    </main>

  </div>

  <script>
    // SIGNAGE CONFIGURATION WITH DEDICATED LIGHT & DARK MODE ACCENTS FOR THE UI
    const themes = [
      { label: "Tatoueurs", color: "#B026FF", colorLight: "#8B00E8" },
      { label: "Tatouages éphémères", color: "#FF007F", colorLight: "#E6006F" },
      { label: "Maquillage", color: "#FF5E7E", colorLight: "#D93658" },
      { label: "Basket 3x3", color: "#FF6B00", colorLight: "#D95200" },
      { label: "Graff", color: "#2CD40E", colorLight: "#28B30C" },
      { label: "Danse", color: "#E6C200", colorLight: "#C6A300" },
      { label: "Accueil", color: "#00B4D8", colorLight: "#009BB8" },
      { label: "Sérigraphie", color: "#3B82F6", colorLight: "#1D4ED8" },
      { label: "Restauration", color: "#EF4444", colorLight: "#C22525" },
      { label: "Rollers", color: "#04AA72", colorLight: "#04AA72" }
    ];

    // SVG GEOMETRY CONFIGURATION BY DIRECTION (compensated for thick stroke-width="24")
    const arrowGeometry = {
      left: {
        points: "180,220 330,132 330,162.8 820,162.8 820,277.2 330,277.2 330,308",
        textX: 575
      },
      right: {
        points: "820,220 670,132 670,162.8 180,162.8 180,277.2 670,277.2 670,308",
        textX: 425
      }
    };

    let currentIndex = 0;
    let arrowDirection = 'left';  // 'left' | 'right'
    let viewMode = 'presentation'; // 'presentation' | 'grid'

    // DOM ELEMENTS
    const navList = document.getElementById('nav-list');
    const gridView = document.getElementById('grid-view');
    const presentationView = document.getElementById('presentation-view');
    const sidebarNav = document.getElementById('sidebar-nav');
    
    const signageCard = document.getElementById('signage-card');
    const cardBodyContent = document.getElementById('card-body-content');
    
    const slideCounter = document.getElementById('slide-counter');
    const keyboardHint = document.getElementById('keyboard-hint');

    const btnPresentation = document.getElementById('btn-presentation');
    const btnGrid = document.getElementById('btn-grid');

    // HELPER: Convert hex color to comma-separated RGB values for rgba() CSS rules
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r}, ${g}, ${b}`;
    }

    // GENERATE THE GRAFFITI VECTOR SVG MARKUP DYNAMICALLY
    function getSvgHtml(label, direction) {
      const geom = arrowGeometry[direction];
      
      // Uniform font size for perfect visual consistency across all texts
      const textFontSize = 48;
      
      let dripsHtml = "";
      if (direction === 'left') {
        dripsHtml = `
          <!-- Paint Drips (Solid black) -->
          <rect x="442.5" y="277.2" width="15" height="80" rx="7.5" fill="#000000" />

          <rect x="572.5" y="277.2" width="15" height="110" rx="7.5" fill="#000000" />
          <circle cx="580" cy="425" r="7" fill="#000000" />
          
          <rect x="712.5" y="277.2" width="15" height="60" rx="7.5" fill="#000000" />
          <circle cx="720" cy="370" r="5" fill="#000000" />
          
          <!-- Spray Splatters -->

          <circle cx="150" cy="184.8" r="5" fill="#000000" />
          <circle cx="860" cy="268.4" r="7" fill="#000000" />
          <circle cx="840" cy="171.6" r="6" fill="#000000" />
        `;
      } else {
        dripsHtml = `
          <!-- Paint Drips (Right-Symmetric, Solid black) -->
          <rect x="542.5" y="277.2" width="15" height="80" rx="7.5" fill="#000000" />
          <circle cx="550" cy="390" r="6" fill="#000000" />
          
          <rect x="412.5" y="277.2" width="15" height="110" rx="7.5" fill="#000000" />
          <circle cx="420" cy="425" r="7" fill="#000000" />
          
          <rect x="272.5" y="277.2" width="15" height="60" rx="7.5" fill="#000000" />
          <circle cx="280" cy="370" r="5" fill="#000000" />
          
          <!-- Spray Splatters (Right-Symmetric) -->
          <circle cx="880" cy="242" r="8" fill="#000000" />
          <circle cx="850" cy="184.8" r="5" fill="#000000" />
          <circle cx="140" cy="268.4" r="7" fill="#000000" />
          <circle cx="160" cy="171.6" r="6" fill="#000000" />
        `;
      }

      return `
        <svg viewBox="0 0 1000 440" width="100%" height="auto" class="wayfinding-arrow-svg">
          ${dripsHtml}
          <!-- Arrow with rounded corners (edgecolor + linewidth + joinstyle equivalent) -->
          <polygon points="${geom.points}" fill="#000000" stroke="#000000" stroke-width="24" stroke-linejoin="round" />
          <!-- Stencil text inside arrow body (forced white for B&W printing) -->
          <text x="${geom.textX}" y="220" dominant-baseline="central" text-anchor="middle" fill="#FFFFFF" font-size="${textFontSize}" font-weight="bold" font-family="'Lilita One', sans-serif">${label}</text>
        </svg>
      `;
    }

    // INITIALIZATION
    function init() {
      renderSidebar();
      renderGridView();
      updateCard(0);
      
      // Event Listeners for Keyboard
      document.addEventListener('keydown', handleKeyDown);
    }

    // RENDER THE SIDEBAR LIST ITEMS
    function renderSidebar() {
      navList.innerHTML = '';
      themes.forEach((theme, index) => {
        const li = document.createElement('li');
        li.className = `nav-item ${index === currentIndex ? 'active' : ''}`;
        li.setAttribute('onclick', `selectSlide(${index})`);
        
        // Dynamically style each nav item with a preview border color
        li.style.setProperty('--nav-accent', theme.color);
        
        const textSpan = document.createElement('span');
        textSpan.className = 'nav-item-text';
        textSpan.textContent = theme.label;

        const numSpan = document.createElement('span');
        numSpan.className = 'nav-item-num';
        numSpan.textContent = `W${(index + 1).toString().padStart(2, '0')}`;

        li.appendChild(textSpan);
        li.appendChild(numSpan);
        navList.appendChild(li);
      });
    }

    // RENDER THE INDEX GRID OF ALL SLIDES (statically B&W cards with paint drips)
    function renderGridView() {
      gridView.innerHTML = '';
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      
      themes.forEach((theme, index) => {
        const uiAccentColor = isLight ? theme.colorLight : theme.color;
        
        const miniCard = document.createElement('div');
        miniCard.className = 'mini-card';
        miniCard.setAttribute('onclick', `selectSlide(${index}); setViewMode('presentation');`);
        miniCard.setAttribute('data-dir', arrowDirection);
        
        // Setup individual theme CSS variables (only for hover states in UI)
        miniCard.style.setProperty('--theme-accent', uiAccentColor);
        miniCard.style.setProperty('--theme-accent-rgb', hexToRgb(uiAccentColor));
        
        miniCard.innerHTML = `
          <div class="mini-card-body">
            ${getSvgHtml(theme.label, arrowDirection)}
          </div>
        `;
        gridView.appendChild(miniCard);
      });
    }

    // UPDATE CARD DISPLAY CONTENT AND ACTIVE NAV STATE
    function updateCard(index) {
      currentIndex = index;
      const theme = themes[currentIndex];
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      
      // Select the optimal UI color version for active sidebar/logo highlights
      const activeColor = isLight ? theme.colorLight : theme.color;
      
      // Update Root Accent variables for UI chrome
      document.documentElement.style.setProperty('--accent', activeColor);
      document.documentElement.style.setProperty('--accent-rgb', hexToRgb(activeColor));
      
      // Update SVG content on presentation card
      cardBodyContent.innerHTML = getSvgHtml(theme.label, arrowDirection);
      
      // Set directional data attribute on card for CSS hover transitions
      signageCard.setAttribute('data-dir', arrowDirection);
      
      // Update Slide Counter
      const padNum = (currentIndex + 1).toString().padStart(2, '0');
      slideCounter.textContent = `${padNum} / ${themes.length.toString().padStart(2, '0')}`;

      // Update Sidebar Items Classes
      const navItems = navList.querySelectorAll('.nav-item');
      navItems.forEach((item, idx) => {
        if (idx === currentIndex) {
          item.classList.add('active');
          item.style.color = activeColor;
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          item.classList.remove('active');
          item.style.color = '';
        }
      });
    }

    // TOGGLE DIRECTIONS (Left / Right)
    function setDirection(direction) {
      arrowDirection = direction;
      
      // Update active state in segmented controls
      const btnLeft = document.getElementById('btn-dir-left');
      const btnRight = document.getElementById('btn-dir-right');
      
      if (arrowDirection === 'left') {
        btnLeft.classList.add('active');
        btnRight.classList.remove('active');
      } else {
        btnLeft.classList.remove('active');
        btnRight.classList.add('active');
      }
      
      // Refresh current card layout
      updateCard(currentIndex);
      
      // Refresh grid view layouts if active
      if (viewMode === 'grid') {
        renderGridView();
      }
    }

    // SLIDE SELECTION BY USER
    function selectSlide(index) {
      updateCard(index);
    }

    // NAVIGATE NEXT/PREVIOUS IN PRESENTATION MODE
    function navigate(direction) {
      let newIndex = currentIndex + direction;
      if (newIndex < 0) {
        newIndex = themes.length - 1; // Loop back to end
      } else if (newIndex >= themes.length) {
        newIndex = 0; // Loop back to start
      }
      updateCard(newIndex);
    }

    // TOGGLE APP VIEW MODE (Presentation vs Grid Dashboard)
    function setViewMode(mode) {
      viewMode = mode;
      
      if (viewMode === 'presentation') {
        presentationView.style.display = 'flex';
        gridView.classList.remove('active');
        sidebarNav.style.display = 'flex';
        keyboardHint.style.opacity = '0.6';
        
        btnPresentation.classList.add('btn-active');
        btnGrid.classList.remove('btn-active');
      } else {
        presentationView.style.display = 'none';
        
        // Re-render grid to apply correct direction/color mappings
        renderGridView();
        
        gridView.classList.add('active');
        sidebarNav.style.display = 'none';
        keyboardHint.style.opacity = '0.2';
        
        btnPresentation.classList.remove('btn-active');
        btnGrid.classList.add('btn-active');
      }
    }

    // TOGGLE APP COLOUR THEME (Light vs Dark Mode)
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', nextTheme);
      
      // Update Theme Button Icon
      const btnTheme = document.getElementById('btn-theme');
      if (nextTheme === 'light') {
        btnTheme.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        `;
      } else {
        btnTheme.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        `;
      }
      
      // Refresh current card color variables
      updateCard(currentIndex);
      
      // Refresh grid view colors if active
      if (viewMode === 'grid') {
        renderGridView();
      }
    }

    // DOWNLOAD CURRENT SIGNAL AS SVG
    function downloadSvg() {
      const theme = themes[currentIndex];
      let svgMarkup = getSvgHtml(theme.label, arrowDirection);
      
      // Inject Google font stylesheet so it displays correctly when downloaded
      const styleInject = `<defs><style>@import url('https://fonts.googleapis.com/css2?family=Lilita+One&amp;display=swap');</style></defs>`;
      svgMarkup = svgMarkup.replace('<svg ', `<svg xmlns="http://www.w3.org/2000/svg" `);
      svgMarkup = svgMarkup.replace('>', `>${styleInject}`);
      
      const blob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      
      // Format filename nicely
      const cleanLabel = theme.label.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]+/g, "-");
      link.download = `panneau-${cleanLabel}-${arrowDirection}.svg`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    // DOWNLOAD CURRENT SIGNAL AS PNG (High Resolution)
    function downloadPng() {
      const theme = themes[currentIndex];
      const svgElement = document.getElementById('card-body-content').querySelector('svg');
      if (!svgElement) return;
      
      // Clone and modify SVG to add namespaces and styles
      const clonedSvg = svgElement.cloneNode(true);
      clonedSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      
      // Add font stylesheet to cloned SVG for canvas rendering
      const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
      style.textContent = "@import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');";
      clonedSvg.insertBefore(style, clonedSvg.firstChild);
      
      const svgString = new XMLSerializer().serializeToString(clonedSvg);
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const blobURL = URL.createObjectURL(svgBlob);
      
      const image = new Image();
      image.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 2000; // 2K HD print quality
        canvas.height = 880;
        const context = canvas.getContext('2d');
        
        // Solid white background for printing
        context.fillStyle = '#FFFFFF';
        context.fillRect(0, 0, canvas.width, canvas.height);
        
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        
        try {
          const pngURL = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = pngURL;
          const cleanLabel = theme.label.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]+/g, "-");
          link.download = `panneau-${cleanLabel}-${arrowDirection}.png`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } catch (e) {
          console.error("Canvas export failed:", e);
        } finally {
          URL.revokeObjectURL(blobURL);
        }
      };
      
      image.onerror = (err) => {
        console.error("Image loading failed:", err);
        URL.revokeObjectURL(blobURL);
      };
      
      image.src = blobURL;
    }

    // HANDLE KEYBOARD SHORTCUTS
    function handleKeyDown(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        if (viewMode === 'presentation') navigate(1);
      } else if (e.key === 'ArrowLeft') {
        if (viewMode === 'presentation') navigate(-1);
      } else if (e.key.toLowerCase() === 'g') {
        setViewMode(viewMode === 'presentation' ? 'grid' : 'presentation');
      } else if (e.key.toLowerCase() === 't') {
        toggleTheme();
      } else if (e.key.toLowerCase() === 's') {
        setDirection(arrowDirection === 'left' ? 'right' : 'left');
      }
    }

    // RUN THE APPLICATION
    init();
  </script>
</body>
</html>
